<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrailrBox | Watch Trending Trailers</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="screen.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TrailrBox">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <nav class="p-4 flex justify-between items-center border-b border-gray-800 sticky top-0 bg-black z-50">
        <h1 class="text-2xl font-bold text-red-600 tracking-tighter">TRAILRBOX</h1>
        <div class="flex items-center gap-3">
            <button id="installAppBtn" class="hidden bg-transparent border border-red-600 text-red-600 px-3 py-1.5 rounded-lg flex items-center gap-2 hover:bg-red-600 hover:text-white transition-all duration-300 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10"></path>
                </svg>
                <span class="hidden sm:inline">Install App</span>
            </button>
            <input type="text" id="searchInput" placeholder="Search movies..." class="bg-gray-900 text-sm px-4 py-2 rounded-full border border-gray-700 focus:outline-none focus:border-red-500">
        </div>
    </nav>

    <!-- Interstitial Ad Overlay -->
    <div id="interstitialOverlay" class="hidden fixed inset-0 bg-black z-[9999] flex items-center justify-center">
        <div class="text-center">
            <div class="mb-8">
                <div class="w-16 h-16 border-4 border-red-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <div class="text-white text-xl font-semibold mb-2">Preparing your trailer...</div>
                <div class="text-red-600 text-3xl font-bold" id="countdown">5</div>
            </div>
            <div class="w-64 h-1 bg-gray-800 rounded-full overflow-hidden">
                <div id="progressBar" class="h-full bg-red-600 transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- Cinema Mode Modal -->
    <div id="cinemaModal" class="hidden fixed inset-0 bg-black z-[9998]">
        <div class="relative w-full h-full flex items-center justify-center">
            <div class="absolute top-4 left-4 z-50">
                <button id="backToHome" class="bg-gray-800 hover:bg-gray-700 text-white p-2 rounded-lg transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                </button>
            </div>
            <div class="absolute top-4 right-4 z-50">
                <button id="closeCinema" class="bg-gray-800 hover:bg-gray-700 text-white p-2 rounded-lg transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="cinemaPlayer" class="w-full max-w-6xl mx-auto px-4">
                <!-- YouTube iframe will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Movie Details Modal -->
    <div id="movieDetailsModal" class="hidden fixed inset-0 bg-black bg-opacity-90 z-[9997] flex items-center justify-center p-4">
        <div class="bg-gray-900 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="relative">
                <button id="closeDetails" class="absolute top-4 right-4 bg-gray-800 hover:bg-gray-700 text-white p-2 rounded-lg transition-colors z-10">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
                <div id="detailsContent" class="p-6">
                    <!-- Movie details will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Legacy Video Container (kept for compatibility) -->
    <div id="videoContainer" class="hidden w-full aspect-video bg-gray-900 relative">
        <div id="player"></div>
        <button id="closePlayer" class="absolute top-4 right-4 bg-red-600 px-3 py-1 rounded text-xs">Close</button>
    </div>

    <main class="p-4">
        <!-- My Favorites Section -->
        <div id="favoritesSection" class="hidden mb-6">
            <h2 class="text-lg font-semibold mb-4 text-red-600">My Favorites</h2>
            <div id="favoritesGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 overflow-x-auto">
            </div>
        </div>

        <!-- Trending Now Section -->
        <h2 class="text-lg font-semibold mb-4 text-gray-400" id="gridTitle">Trending Now</h2>
        <div id="movieGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
        </div>

        <!-- Recently Viewed Section -->
        <div id="recentSection" class="hidden mt-8">
            <h2 class="text-lg font-semibold mb-4 text-gray-400">Recently Viewed</h2>
            <div id="recentGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 overflow-x-auto">
            </div>
        </div>
    </main>

    <!-- Social Bar Ad Container -->
    <div id="socialBarAd" style="position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: transparent;"></div>

    <script src="script.js"></script>
</body>
</html>
